<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoTracker &middot; Auth</title>
    <link rel="stylesheet" href="../assets/styles/auth.css" />
  </head>
  <body>
    <button
      class="theme-toggle-floating"
      type="button"
      data-theme-toggle
      aria-label="Toggle color mode"
    >
      Dark mode
    </button>

    <div class="auth-wrapper">
      <main class="auth-card">
        <div class="logo">
          <span class="logo-mark">
            <img src="../assets/images/eco.png" alt="EcoTracker logo" />
          </span>
          <span class="logo-text">EcoTracker</span>
        </div>
        <h1 id="auth-title">Welcome back</h1>
        <p id="auth-subtitle">Sign in to view your EcoScore, goals, and scanners.</p>

        <div class="auth-switch" role="tablist" aria-label="Authentication mode">
          <button
            type="button"
            class="auth-tab active"
            data-auth-mode="login"
            aria-selected="true"
          >
            Log in
          </button>
          <button
            type="button"
            class="auth-tab"
            data-auth-mode="signup"
            aria-selected="false"
          >
            Sign up
          </button>
        </div>

        <form id="login-form" action="./login.html" method="get">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@email.com"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="********"
            required
          />

          <div class="actions" id="auth-actions">
            <label>
              <input type="checkbox" name="remember" />
              Keep me logged in
            </label>
            <a
              id="forgot-password-link"
              href="mailto:support@ecotracker.app?subject=EcoTracker%20password%20reset"
              >Forgot password?</a
            >
          </div>

          <button type="submit">Log in</button>
        </form>
        <p id="auth-message" class="auth-message" hidden></p>

        <p class="supporting-link">Email + password only. Fast and simple.</p>

        <a class="primary-btn" href="./index.html">Back to home</a>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/config/runtime-config.js"></script>
    <script type="module" src="../src/pages/login.page.js"></script>
  </body>
</html>
