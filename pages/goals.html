<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoTracker &middot; Goals</title>
    <link rel="stylesheet" href="../assets/styles/app.css" />
  </head>
  <body>
    <header>
      <div class="top-row">
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Toggle color mode"
        >
          Dark mode
        </button>
        <a class="logout-link" href="./login.html">Log out</a>
      </div>
      <p>Weekly rhythm</p>
      <h1 id="goals-title">Loading goals...</h1>
      <p id="goals-subtitle"></p>
    </header>

    <main class="page">
      <div class="quick-actions" id="goals-quick-actions"></div>

      <section class="card" id="focus-areas">
        <h2>Focus areas</h2>
        <div class="filters" data-filter-group>
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="transport">Transport</button>
          <button class="filter-btn" data-filter="energy">Energy</button>
          <button class="filter-btn" data-filter="consumption">Consumption</button>
        </div>
        <ul class="progress-list" id="goals-focus-list"></ul>
      </section>

      <section class="grid" id="goal-highlights">
        <article class="tile">
          <h3>Current streak</h3>
          <p id="goals-current-streak"></p>
        </article>
        <article class="tile">
          <h3>Badges unlocked</h3>
          <p id="goals-badges"></p>
        </article>
        <article class="tile">
          <h3>Upcoming challenge</h3>
          <p id="goals-upcoming-challenge"></p>
        </article>
      </section>

      <section class="card list-section" id="nudges">
        <h2>Upcoming EcoCoach nudges</h2>
        <ul class="task-list" id="goals-nudges-list" data-task-list="goals"></ul>
      </section>

      <section class="insight-grid" id="goal-insights">
        <article class="insight">
          <h3>Goal health</h3>
          <p id="goals-health"></p>
        </article>
        <article class="insight">
          <h3>Rewards queue</h3>
          <p id="goals-rewards-queue"></p>
        </article>
      </section>

      <div class="alert error" id="goals-message" hidden></div>
    </main>

    <nav class="navbar">
      <a href="./dashboard.html">Home</a>
      <a href="./scan.html">Scan</a>
      <a href="./goals.html" class="active">Goals</a>
      <a href="./profile.html">Profile</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/config/runtime-config.js"></script>
    <script type="module" src="../src/pages/goals.page.js"></script>
  </body>
</html>
