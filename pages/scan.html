<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoTracker &middot; Scan</title>
    <link rel="stylesheet" href="../assets/styles/app.css" />
  </head>
  <body>
    <header>
      <div class="top-row">
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Toggle color mode"
        >
          Dark mode
        </button>
        <a class="logout-link" href="./login.html">Log out</a>
      </div>
      <p id="scan-guidance-title">Loading...</p>
      <h1 id="scan-title">Loading scan content...</h1>
      <p id="scan-subtitle"></p>
    </header>

    <main class="page">
      <div class="quick-actions" id="scan-action-buttons"></div>

      <section class="card">
        <h2 id="scan-camera-title">Live camera scan</h2>
        <p id="scan-camera-subtitle"></p>
        <div class="camera-mock">
          <div class="camera-icon">📷</div>
          <p id="scan-guidance-subtitle"></p>
          <button type="button" id="scan-camera-status"></button>
        </div>
      </section>

      <section class="grid">
        <article class="tile" id="ai-waste">
          <h3>AI waste scanning</h3>
          <ul class="list" id="scan-ai-waste-list"></ul>
        </article>
        <article class="tile" id="barcode">
          <h3>Product barcode scanner</h3>
          <ul class="list" id="scan-barcode-list"></ul>
        </article>
      </section>

      <section class="card history-card" id="history">
        <h2>Latest activity</h2>
        <ul class="list" id="scan-events-list"></ul>
      </section>

      <section class="insight-grid">
        <article class="insight">
          <h3>Recent scans</h3>
          <p id="scan-recent-summary"></p>
        </article>
        <article class="insight">
          <h3>EcoCoach tip</h3>
          <p id="scan-ecocoach-tip"></p>
        </article>
        <article class="insight">
          <h3>Rewards</h3>
          <p id="scan-rewards"></p>
        </article>
      </section>

      <div class="alert error" id="scan-message" hidden></div>
    </main>

    <nav class="navbar">
      <a href="./dashboard.html">Home</a>
      <a href="./scan.html" class="active">Scan</a>
      <a href="./goals.html">Goals</a>
      <a href="./profile.html">Profile</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/config/runtime-config.js"></script>
    <script type="module" src="../src/pages/scan.page.js"></script>
  </body>
</html>
