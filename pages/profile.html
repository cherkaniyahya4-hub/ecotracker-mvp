<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoTracker &middot; Profile</title>
    <link rel="stylesheet" href="../assets/styles/app.css" />
  </head>
  <body>
    <header>
      <div class="top-row">
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Toggle color mode"
        >
          Dark mode
        </button>
        <a class="logout-link" href="./login.html">Log out</a>
      </div>
      <p>Your plan</p>
      <h1 id="profile-title">Loading profile...</h1>
      <p id="profile-subtitle"></p>
    </header>

    <main class="page">
      <div class="quick-actions" id="profile-quick-actions"></div>

      <section class="card" id="personal-profile">
        <h2>Personal profile</h2>
        <ul class="list" id="profile-personal-items"></ul>
      </section>

      <section class="card edit-card" id="edit-profile">
        <h2>Edit profile</h2>
        <form class="profile-form">
          <div>
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" placeholder="Your name" />
          </div>
          <div>
            <label for="city">Home city</label>
            <input id="city" name="city" type="text" placeholder="Your city" />
          </div>
          <div>
            <label for="mode">Preferred mobility mode</label>
            <select id="mode" name="mode">
              <option value="">Select one</option>
              <option>Bike + Transit</option>
              <option>Walking</option>
              <option>Transit only</option>
              <option>EV driving</option>
            </select>
          </div>
          <div>
            <label for="goal">Primary eco-goal</label>
            <input id="goal" name="goal" type="text" placeholder="Your eco-goal" />
          </div>
          <button type="submit" class="primary-btn">Save changes</button>
        </form>
        <div class="alert success" id="profile-alert" hidden>Profile updated successfully!</div>
      </section>

      <section class="grid">
        <article class="tile">
          <h3>Connected accounts</h3>
          <p id="profile-connected-accounts"></p>
        </article>
        <article class="tile">
          <h3>Community rank</h3>
          <p id="profile-community-rank"></p>
        </article>
        <article class="tile">
          <h3>Support</h3>
          <p id="profile-support-text"></p>
        </article>
      </section>

      <section class="card list-section" id="account-controls">
        <h2>Account controls</h2>
        <ul class="list" id="profile-account-controls"></ul>
      </section>

      <section class="insight-grid">
        <article class="insight">
          <h3>EcoCoach persona</h3>
          <p id="profile-persona-text"></p>
        </article>
        <article class="insight">
          <h3>Support status</h3>
          <p id="profile-support-status"></p>
        </article>
      </section>

      <div class="alert error" id="profile-message" hidden></div>
    </main>

    <nav class="navbar">
      <a href="./dashboard.html">Home</a>
      <a href="./scan.html">Scan</a>
      <a href="./goals.html">Goals</a>
      <a href="./profile.html" class="active">Profile</a>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/config/runtime-config.js"></script>
    <script type="module" src="../src/pages/profile.page.js"></script>
  </body>
</html>
